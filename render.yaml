services:
  - type: web
    name: ipl-copilot
    env: python
    region: oregon
    plan: starter        # $7/mo — always on, required for background loops
    buildCommand: pip install -e .
    startCommand: mkdir -p /app/data/models /app/data/ipl_csv && if [ ! -f /app/data/models/match_model.joblib ]; then cp artifacts/models/*.joblib /app/data/models/; fi && uvicorn cricket_predictor.api.app:app --host 0.0.0.0 --port $PORT --app-dir src
    healthCheckPath: /health
    envVars:
      - key: CRICKET_PREDICTOR_ENABLE_STANDINGS_REFRESH
        value: "true"
      - key: CRICKET_PREDICTOR_STANDINGS_REFRESH_MINUTES
        value: "30"
      - key: CRICKET_PREDICTOR_ENABLE_CRICSHEET_UPDATES
        value: "false"
      - key: CRICKET_PREDICTOR_CRICSHEET_CHECK_INTERVAL_HOURS
        value: "24"
      - key: CRICKET_PREDICTOR_TRACKER_INTERVAL_SECONDS
        value: "3600"
      - key: CRICKET_PREDICTOR_LIVE_PROVIDER
        value: ipl_csv
      - key: CRICKET_PREDICTOR_ENABLE_LIVE_UPDATES
        value: "true"
      - key: CRICKET_PREDICTOR_LIVE_REFRESH_SECONDS
        value: "3600"
      - key: CRICKET_PREDICTOR_IPL_CSV_DATA_DIR
        value: /app/data/ipl_csv
      - key: CRICKET_PREDICTOR_ENABLE_IPL_CSV_REFRESH
        value: "true"
      - key: CRICKET_PREDICTOR_IPL_CSV_REFRESH_HOURS
        value: "24"
      - key: CRICKET_PREDICTOR_IPL_CSV_REFRESH_COMMAND
        value: sh /opt/render/project/src/scripts/refresh_ipl_csv.sh
      - key: CRICKET_PREDICTOR_IPL_CSV_DOWNLOAD_URL
        value: https://www.kaggle.com/api/v1/datasets/download/krishd123/ipl-2026-complete-dataset
      - key: CRICKET_PREDICTOR_MODEL_ARTIFACT_DIR
        value: /app/data/models
      - key: CRICKET_PREDICTOR_SYNTHETIC_DATA_DIR
        value: /app/data/synthetic
      - key: CRICKET_PREDICTOR_CRICSHEET_DATA_DIR
        value: /app/data/cricsheet
      - key: CRICKET_PREDICTOR_AZURE_OPENAI_API_KEY
        value: REPLACE_WITH_YOUR_AZURE_OPENAI_API_KEY
      - key: CRICKET_PREDICTOR_AZURE_OPENAI_ENDPOINT
        value: https://your-resource.cognitiveservices.azure.com
      - key: CRICKET_PREDICTOR_AZURE_OPENAI_DEPLOYMENT
        value: gpt-4.1
    disk:
      name: cricket-predictor-data
      mountPath: /app/data
      sizeGB: 2
